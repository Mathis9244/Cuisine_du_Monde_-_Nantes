services:
  - type: web
    name: restaurants-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: restaurants-api.onrender.com
      - key: PORT
        value: 10000
    healthCheckPath: /api/restaurants/
