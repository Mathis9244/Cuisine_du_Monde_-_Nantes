name: CD

on:
  push:
    branches: [main, V2]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  healthcheck:
    name: Smoke test container
    runs-on: ubuntu-latest
    needs: docker
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local image for smoke test
        run: docker build -t cuisine-du-monde:ci .

      - name: Run container
        run: |
          docker run -d --name app -p 3000:3000 \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-placeholder \
            cuisine-du-monde:ci

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/docs >/dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker logs app
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f app
