name: cuisine_du_monde_nantes

# La base de données et l'auth sont gérées par Supabase (service managé).
# Ce compose lance uniquement l'application web Next.js (front + API).
# Le scraper (scraper/) est un worker autonome, lancé à la demande / en cron.

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ADMIN_ROLE: ${ADMIN_ROLE:-admin}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
