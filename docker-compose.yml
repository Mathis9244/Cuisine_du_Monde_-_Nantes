name: cuisine_du_monde_nantes

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cuisine
      POSTGRES_PASSWORD: cuisine
      POSTGRES_DB: cuisine_du_monde
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuisine -d cuisine_du_monde"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://cuisine:cuisine@postgres:5432/cuisine_du_monde
      JWT_SECRET: changez-moi-en-production-minimum-32-caracteres
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      BACKEND_URL: http://backend:3001
    depends_on:
      - backend

volumes:
  postgres_data:
